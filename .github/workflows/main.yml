name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Create Minimal Project
      run: |
        # 1. 创建绝对最简单的项目
        mkdir -p app/src/main/java/com/example/chianiuprinter
        
        # 2. 创建最简单的build.gradle（根目录）
        cat > build.gradle << 'EOF'
        // 空文件
        EOF
        
        # 3. 创建最简单的settings.gradle
        cat > settings.gradle << 'EOF'
        rootProject.name = "ChianiuPrinter"
        include ':app'
        EOF
        
        # 4. 创建最简单的app/build.gradle
        cat > app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
        }
        
        android {
            compileSdk 33
        
            defaultConfig {
                applicationId "com.example.chianiuprinter"
                minSdk 26
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
        
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }
        
        dependencies {
            // 空依赖
        }
        EOF
        
        # 5. 创建最简单的AndroidManifest.xml
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application>
                <activity android:name=".MainActivity">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        # 6. 创建最简单的MainActivity
        cat > app/src/main/java/com/example/chianiuprinter/MainActivity.java << 'EOF'
        package com.example.chianiuprinter;
        
        import android.app.Activity;
        
        public class MainActivity extends Activity {
        }
        EOF
      
    - name: Build APK with Gradle 7.6
      run: |
        # 使用特定版本的gradle
        wget https://services.gradle.org/distributions/gradle-7.6-bin.zip
        unzip gradle-7.6-bin.zip
        ./gradle-7.6/bin/gradle :app:assembleDebug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: chianiu-printer-apk
        path: app/build/outputs/apk/debug/*.apk
