name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Create Working Project
      run: |
        # 1. 创建项目结构
        mkdir -p app/src/main/java/com/example/chianiuprinter
        mkdir -p app/src/main/res
        
        # 2. 创建settings.gradle（关键！）
        cat > settings.gradle << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
            plugins {
                id 'com.android.application' version '8.1.0'
            }
        }
        
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
            repositories {
                google()
                mavenCentral()
            }
        }
        
        rootProject.name = "ChianiuPrinter"
        include ':app'
        EOF
        
        # 3. 创建app/build.gradle（带版本号）
        cat > app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application' version '8.1.0' apply false
        }
        
        apply plugin: 'com.android.application'
        
        android {
            namespace 'com.example.chianiuprinter'
            compileSdk 33
        
            defaultConfig {
                applicationId "com.example.chianiuprinter"
                minSdk 26
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
        
            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
            }
        }
        
        dependencies {
            implementation 'androidx.core:core-ktx:1.10.1'
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF
        
        # 4. 创建AndroidManifest.xml
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.BLUETOOTH" />
            
            <application
                android:allowBackup="true"
                android:label="牵牛花打印助手">
                
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                
            </application>
        </manifest>
        EOF
        
        # 5. 创建MainActivity
        cat > app/src/main/java/com/example/chianiuprinter/MainActivity.kt << 'EOF'
        package com.example.chianiuprinter
        
        import android.os.Bundle
        import androidx.appcompat.app.AppCompatActivity
        
        class MainActivity : AppCompatActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
            }
        }
        EOF
        
        # 6. 创建gradle wrapper
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        echo "#!/bin/bash" > gradlew
        echo 'gradle "$@"' >> gradlew
        chmod +x gradlew
      
    - name: Build APK
      run: |
        # 使用系统gradle（最简单）
        gradle :app:assembleDebug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: chianiu-printer-apk
        path: app/build/outputs/apk/debug/*.apk
